<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6a21a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Caisse Moroges</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#fffaf2;color:#241414}
body{height:100vh;overflow:hidden}
header{height:54px;background:white;border-bottom:2px solid #ead9bf;padding:7px 12px}
h1{font-size:22px;margin:0}
.hint{font-size:12px;color:#6b4d37}
main{height:calc(100vh - 54px);display:grid;grid-template-columns:46% 22% 32%;gap:8px;padding:8px}
.panel{background:white;border:2px solid #ead9bf;border-radius:14px;padding:8px;overflow:auto}
h2{font-size:19px;margin:0 0 8px}
.products{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.cat{grid-column:1/-1;background:#fff4d6;border-left:7px solid #f6a21a;border-radius:8px;padding:6px 10px;font-size:17px;font-weight:900;margin-top:3px}
.prod{border:2px solid #ead9bf;background:white;border-radius:13px;padding:8px;min-height:82px;font-size:15px;font-weight:800;box-shadow:0 2px 0 #e6d1aa}
.prod:active{transform:translateY(1px);box-shadow:none}
.ico{font-size:27px;display:inline-block;margin-right:4px}
.price{display:block;color:#c62828;font-size:22px;font-weight:900;margin-top:3px}
.cartline{border-bottom:1px dashed #ddd;padding:7px 0}
.carttitle{font-size:14px;font-weight:700}
.cartprice{font-size:16px;font-weight:900;color:#c62828}
.qty{float:right;white-space:nowrap}
.qty button{width:32px;height:32px;border-radius:8px;border:1px solid #bbb;background:white;font-size:20px;font-weight:900}
.qty span{display:inline-block;width:24px;text-align:center;font-weight:900}
.total{font-size:32px;font-weight:900;color:#c62828;text-align:right;margin:10px 0}
.actionrow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.actionrow button{border:0;border-radius:12px;padding:12px;font-size:15px;font-weight:900}
.undo{background:#eee}.reset{background:#351b1b;color:white}
.biglabel{font-size:18px;font-weight:900;margin-top:4px}
.screen{border:2px solid #ead9bf;border-radius:12px;background:#fffaf2;text-align:right;font-size:31px;font-weight:900;padding:9px;margin:5px 0}
.change{font-size:32px;font-weight:900;color:#2e7d32;text-align:right;margin:5px 0 8px}
.keypad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.keypad button{border:1px solid #efcf83;border-radius:13px;background:#fff3d0;font-size:30px;font-weight:900;padding:13px}
.keypad .clear{background:#eee;border-color:#ddd}
.keypad .exact{grid-column:span 2;background:#dff5df;border-color:#bbe0bb;font-size:18px}
.quick{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-top:7px}
.quick button{border:1px solid #efcf83;border-radius:12px;background:#fff3d0;font-size:17px;font-weight:900;padding:10px}
.payrow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.payrow button{border:0;border-radius:14px;padding:14px;font-size:17px;font-weight:900}
.cash{background:#dff5df}.cb{background:#dfeaff}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.tabs button{border:0;border-radius:10px;padding:9px;font-weight:900;background:#eee}
.tabs button.active{background:#f6a21a}
#bilan{display:none}
.sumline{display:grid;grid-template-columns:1fr auto auto;gap:6px;border-bottom:1px solid #eee;padding:6px 0;font-size:13px}
.sumtotal{font-size:20px;font-weight:900;margin:8px 0}
@media (orientation:portrait){
 body{overflow:auto;height:auto}
 main{height:auto;display:block}
 .panel{margin:8px;max-height:none}
}
</style>
</head>
<body>
<header>
<h1>🍻 Caisse Moroges</h1>
<div class="hint">Vente tickets + consignes. Saisie espèces : 2000 = 20,00 €.</div>
</header>

<main>
<section class="panel">
<h2>Produits</h2>
<div class="products" id="products"></div>
</section>

<section class="panel">
<h2>Commande</h2>
<div id="cart"></div>
<div class="total">Total<br><span id="total">0,00 €</span></div>
<div class="actionrow">
<button class="undo" id="undoBtn">Annuler</button>
<button class="reset" id="resetBtn">Nouvelle</button>
</div>
</section>

<section class="panel">
<div class="tabs">
<button id="tabCaisse" class="active">Caisse</button>
<button id="tabBilan">Bilan</button>
</div>

<div id="caisse">
<div class="biglabel">Reçu espèces</div>
<div class="screen" id="paid">0,00 €</div>
<div class="biglabel">À rendre</div>
<div class="change" id="change">0,00 €</div>

<div class="keypad">
<button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button>
<button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
<button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
<button data-key="0">0</button><button id="backBtn" class="clear">⌫</button><button id="clearBtn" class="clear">C</button>
<button id="exactBtn" class="exact">Montant exact</button><button id="add50Btn" class="clear">+0,50</button>
</div>

<div class="quick">
<button data-bill="500">5€</button><button data-bill="1000">10€</button><button data-bill="2000">20€</button><button data-bill="5000">50€</button>
</div>

<div class="payrow">
<button class="cash" id="cashBtn">Valider espèces</button>
<button class="cb" id="cbBtn">Valider CB</button>
</div>
</div>

<div id="bilan">
<h2>Bilan</h2>
<div id="summary"></div>
<div class="actionrow">
<button class="undo" id="exportBtn">Exporter CSV</button>
<button class="reset" id="resetSalesBtn">RAZ bilan</button>
</div>
</div>
</section>
</main>

<script>
(function(){
var products = [
{cat:"Boissons"},
{name:"Eau minérale 50 cl",price:0.50,emoji:"💧"},
{name:"Eau minérale 1,5 L",price:1.50,emoji:"💧"},
{name:"Soft canette",price:2.00,emoji:"🥤"},
{name:"Bière pression 25 cl",price:2.50,emoji:"🍺"},
{name:"Pichet bière 1 L",price:9.00,emoji:"🍻"},
{name:"Vin au verre",price:3.00,emoji:"🍷"},
{name:"Bouteille de vin",price:11.00,emoji:"🍾"},
{name:"Bouteille de crémant",price:13.00,emoji:"🥂"},
{cat:"Restauration"},
{name:"Assiette 2 viandes + frites",price:7.00,emoji:"🍟"},
{name:"Barquette de frites",price:2.50,emoji:"🍟"},
{name:"Glace vanille",price:2.00,emoji:"🍦"},
{name:"Cornet de popcorn",price:1.00,emoji:"🍿"},
{name:"Menu",price:10.00,emoji:"🍽️"},
{name:"Supplément verre de vin",price:0.50,emoji:"🍷"},
{cat:"Consignes"},
{name:"Consigne gobelet",price:2.00,emoji:"♻️"},
{name:"Retour consigne gobelet",price:-2.00,emoji:"↩️"}
];

var cart = {};
var history = [];
var paidDigits = "";
var sales = [];
try { sales = JSON.parse(localStorage.getItem("morogesSalesPWA") || "[]"); } catch(e){ sales = []; }

function euro(n){ return Number(n).toLocaleString("fr-FR",{style:"currency",currency:"EUR"}); }
function total(){ var s=0; for(var k in cart){ s += products[k].price * cart[k]; } return s; }
function paidCents(){ return paidDigits === "" ? 0 : parseInt(paidDigits,10); }
function paidAmount(){ return paidCents()/100; }
function saveSales(){ try{ localStorage.setItem("morogesSalesPWA", JSON.stringify(sales)); }catch(e){} }

function addProduct(i){ cart[i] = (cart[i] || 0) + 1; history.push(i); render(); }
function removeOne(i){ if(!cart[i]) return; cart[i]--; if(cart[i] <= 0) delete cart[i]; render(); }
function renderProducts(){
  var html = "";
  for(var i=0;i<products.length;i++){
    var p = products[i];
    if(p.cat){ html += '<div class="cat">' + p.cat + '</div>'; }
    else { html += '<button class="prod" data-product="'+i+'"><span class="ico">'+p.emoji+'</span>'+p.name+'<span class="price">'+euro(p.price)+'</span></button>'; }
  }
  document.getElementById("products").innerHTML = html;
}
function render(){
  var html = "";
  var empty = true;
  for(var k in cart){
    empty = false;
    var p = products[k], q = cart[k];
    html += '<div class="cartline"><div class="qty"><button data-minus="'+k+'">−</button><span>'+q+'</span><button data-plus="'+k+'">+</button></div><div class="carttitle">'+p.emoji+' '+p.name+'</div><div class="cartprice">'+euro(p.price*q)+'</div></div>';
  }
  document.getElementById("cart").innerHTML = empty ? "<p>Aucun article.</p>" : html;
  var t = total();
  document.getElementById("total").textContent = euro(t);
  document.getElementById("paid").textContent = euro(paidAmount());
  document.getElementById("change").textContent = euro(Math.max(0, paidAmount() - t));
}
function resetCart(){ cart={}; history=[]; paidDigits=""; render(); }
function undo(){ var i = history.pop(); if(i !== undefined) removeOne(i); }
function tap(d){ if(paidDigits.length < 7){ paidDigits += String(d); render(); } }
function backspace(){ paidDigits = paidDigits.slice(0,-1); render(); }
function clearPaid(){ paidDigits = ""; render(); }
function setPaidCents(c){ paidDigits = String(c); render(); }
function exactPaid(){ paidDigits = String(Math.round(total()*100)); render(); }
function addCents(c){ paidDigits = String(paidCents()+c); render(); }

function checkout(method){
  var t = total();
  if(t === 0){ alert("Aucune commande à valider."); return; }
  var paid = method === "Espèces" ? paidAmount() : t;
  if(method === "Espèces" && paid < t){
    if(!confirm("Le montant reçu est inférieur au total. Valider quand même ?")) return;
  }
  var items = [];
  for(var k in cart){ items.push({name:products[k].name, price:products[k].price, qty:cart[k], total:products[k].price*cart[k]}); }
  sales.push({date:new Date().toLocaleString("fr-FR"), method:method, total:t, paid:paid, change:Math.max(0, paid-t), items:items});
  saveSales(); resetCart(); alert("Vente enregistrée : " + method + " - " + euro(t));
}
function showCaisse(){
  document.getElementById("caisse").style.display = "block"; document.getElementById("bilan").style.display = "none";
  document.getElementById("tabCaisse").className = "active"; document.getElementById("tabBilan").className = "";
}
function showBilan(){
  document.getElementById("caisse").style.display = "none"; document.getElementById("bilan").style.display = "block";
  document.getElementById("tabCaisse").className = ""; document.getElementById("tabBilan").className = "active"; renderSummary();
}
function renderSummary(){
  var qty={}, amount={}, pay={"Espèces":0,"CB":0};
  for(var i=0;i<sales.length;i++){
    var s=sales[i]; pay[s.method]=(pay[s.method]||0)+s.total;
    for(var j=0;j<s.items.length;j++){ var it=s.items[j]; qty[it.name]=(qty[it.name]||0)+it.qty; amount[it.name]=(amount[it.name]||0)+it.total; }
  }
  var totalSales=0; for(var i=0;i<sales.length;i++) totalSales += sales[i].total;
  var html='<div class="sumtotal">Total ventes : '+euro(totalSales)+'</div>';
  html += '<div>Espèces : <strong>'+euro(pay["Espèces"]||0)+'</strong></div>';
  html += '<div>CB : <strong>'+euro(pay["CB"]||0)+'</strong></div>';
  html += '<div>Commandes : <strong>'+sales.length+'</strong></div><h3>Produits vendus</h3>';
  var names=[]; for(var n in qty) names.push(n); names.sort();
  for(var a=0;a<names.length;a++){ var name=names[a]; html += '<div class="sumline"><div>'+name+'</div><div>x'+qty[name]+'</div><div>'+euro(amount[name])+'</div></div>'; }
  document.getElementById("summary").innerHTML = html;
}
function resetSales(){ if(confirm("Effacer définitivement le bilan ?")){ sales=[]; saveSales(); renderSummary(); } }
function downloadCSV(){
  var rows=["Date;Paiement;Produit;Quantite;Prix unitaire;Total ligne;Total commande"];
  for(var i=0;i<sales.length;i++){ var s=sales[i]; for(var j=0;j<s.items.length;j++){ var it=s.items[j]; rows.push([s.date,s.method,it.name,it.qty,it.price.toFixed(2),it.total.toFixed(2),s.total.toFixed(2)].join(";")); } }
  var blob=new Blob([rows.join("\n")],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob); var a=document.createElement("a");
  a.href=url; a.download="bilan_ventes_moroges.csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

document.addEventListener("click", function(e){
  var t=e.target; while(t && t.tagName !== "BUTTON") t=t.parentNode; if(!t) return;
  if(t.getAttribute("data-product") !== null) addProduct(parseInt(t.getAttribute("data-product"),10));
  else if(t.getAttribute("data-plus") !== null) addProduct(parseInt(t.getAttribute("data-plus"),10));
  else if(t.getAttribute("data-minus") !== null) removeOne(parseInt(t.getAttribute("data-minus"),10));
  else if(t.getAttribute("data-key") !== null) tap(t.getAttribute("data-key"));
  else if(t.getAttribute("data-bill") !== null) setPaidCents(parseInt(t.getAttribute("data-bill"),10));
});

document.getElementById("undoBtn").onclick = undo;
document.getElementById("resetBtn").onclick = resetCart;
document.getElementById("backBtn").onclick = backspace;
document.getElementById("clearBtn").onclick = clearPaid;
document.getElementById("exactBtn").onclick = exactPaid;
document.getElementById("add50Btn").onclick = function(){ addCents(50); };
document.getElementById("cashBtn").onclick = function(){ checkout("Espèces"); };
document.getElementById("cbBtn").onclick = function(){ checkout("CB"); };
document.getElementById("tabCaisse").onclick = showCaisse;
document.getElementById("tabBilan").onclick = showBilan;
document.getElementById("exportBtn").onclick = downloadCSV;
document.getElementById("resetSalesBtn").onclick = resetSales;

if("serviceWorker" in navigator){ window.addEventListener("load", function(){ navigator.serviceWorker.register("./service-worker.js").catch(function(){}); }); }
renderProducts(); render();
})();
</script>
</body>
</html>
